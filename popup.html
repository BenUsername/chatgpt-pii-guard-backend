<!DOCTYPE html>
<html>
<head>
  <title>ChatGPT PII Guard</title>
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      margin: 0;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    h1 {
      font-size: 18px;
      margin: 0;
      color: #00ff41;
      display: flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .status-card {
      background: #1e293b;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #334155;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      font-size: 12px;
      color: #94a3b8;
    }
    .stat-val {
      font-size: 16px;
      color: #f8fafc;
      font-weight: bold;
    }
    button {
      background-color: #00ff41;
      color: #0f172a;
      border: none;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      transition: all 0.2s;
      text-transform: uppercase;
    }
    button:hover {
      background-color: #00cc33;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(0, 255, 65, 0.2);
    }
    button:disabled {
      background-color: #334155;
      color: #94a3b8;
      cursor: not-allowed;
    }
    .footer {
      font-size: 10px;
      color: #64748b;
      text-align: center;
      margin-top: 5px;
    }
    .scan-feedback {
      font-size: 12px;
      color: #00ff41;
      margin-top: 8px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span id="icon">🛡️</span> PII Guard</h1>
    <div class="status-card">
      <div id="status-text">Ready to scan...</div>
      <div class="stats">
        <div class="stat-item">
          <span>Scanned</span>
          <span class="stat-val" id="stat-scanned">0</span>
        </div>
        <div class="stat-item">
          <span>Deleted</span>
          <span class="stat-val" id="stat-deleted" style="color: #ef4444;">0</span>
        </div>
      </div>
    </div>
    <button id="scan-btn">Scan My Chats</button>
    <div id="scan-feedback" class="scan-feedback">Scanning in progress...</div>
    <div class="footer">Only active on chatgpt.com</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
